<!DOCTYPE html>
<html lang="en">
<head>
  <base target="_top">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/tailwindcss/2.2.19/tailwind.min.css" rel="stylesheet">
  <style>
    body {
      background-color: #0f172a;
    }
    .error-border { 
      border-color: #ef4444 !important; 
      background-color: #451a1a !important; 
    }
  </style>
</head>
<body class="text-gray-100 min-h-screen flex items-center justify-center p-0 md:p-6 w-full overflow-x-hidden">

  <div class="bg-gray-800 shadow-2xl rounded-none md:rounded-2xl p-6 md:p-10 w-full min-h-screen md:min-h-0 md:max-w-4xl border-0 md:border border-gray-700 flex flex-col justify-between md:justify-start">
    
    <div>
      <!-- Professional Clean Header -->
      <h2 class="text-2xl md:text-3xl font-extrabold mb-6 text-center text-blue-400 tracking-wide border-b border-gray-700 pb-5">
        CertiFlow Workspace
      </h2>

      <form id="masterForm" class="space-y-6" novalidate>
        
        <!-- Section 1: Template Management Layout -->
        <div class="bg-gray-900 bg-opacity-40 p-4 md:p-6 rounded-xl border border-gray-700 space-y-4">
          <h3 class="text-sm font-bold uppercase tracking-wider text-blue-400 mb-2">1. Template Configuration</h3>
          <div>
            <label class="block text-sm font-semibold text-gray-400 mb-2">Google Slide Template URL</label>
            <input type="text" id="slideUrl" placeholder="https://docs.google.com/presentation/d/..."
                   class="w-full bg-gray-700 border border-gray-600 rounded-lg px-4 py-3 text-white placeholder-gray-500 focus:outline-none focus:border-blue-500 text-sm md:text-base transition">
            <p id="err_slideUrl" class="text-xs text-red-400 mt-1 hidden"></p>
          </div>
          
          <div>
            <label class="block text-sm font-semibold text-gray-400 mb-2">Slide Number (Page Index)</label>
            <input type="number" id="slideNumber" min="1" value="1"
                   class="w-full bg-gray-700 border border-gray-600 rounded-lg px-4 py-3 text-white focus:outline-none focus:border-blue-500 text-sm md:text-base transition">
            <p id="err_slideNumber" class="text-xs text-red-400 mt-1 hidden"></p>
          </div>
        </div>

        <!-- Section 2: Data Stream Source & Logic Layout -->
        <div class="bg-gray-900 bg-opacity-40 p-4 md:p-6 rounded-xl border border-gray-700 space-y-5">
          <h3 class="text-sm font-bold uppercase tracking-wider text-blue-400 mb-1">2. Recipient Data Source</h3>
          
          <div class="flex flex-col sm:flex-row space-y-2 sm:space-y-0 sm:space-x-3 w-full border-b border-gray-700 pb-4">
            <button type="button" onclick="switchSource('gsheet')" id="btnGsheet" class="flex-1 py-3 rounded-lg font-bold bg-blue-600 text-white text-sm tracking-wide shadow-md transition">Google Sheet URL</button>
            <button type="button" onclick="switchSource('excel')" id="btnExcel" class="flex-1 py-3 rounded-lg font-bold bg-gray-700 text-gray-300 text-sm tracking-wide hover:bg-gray-600 transition">Upload Excel (.xlsx)</button>
          </div>

          <!-- INTERCHANGEABLE ENGINE A: GOOGLE SHEET STRUCT -->
          <div id="gsheetSection" class="space-y-4">
            <div>
              <label class="block text-sm font-semibold text-gray-400 mb-2">Target Spreadsheet URL</label>
              <div class="flex flex-col sm:flex-row space-y-2 sm:space-y-0 sm:space-x-2">
                <input type="text" id="targetSheetUrl" placeholder="https://docs.google.com/spreadsheets/d/..."
                       class="flex-1 bg-gray-700 border border-gray-600 rounded-lg px-4 py-3 text-white placeholder-gray-500 focus:outline-none focus:border-blue-500 text-sm transition">
                <button type="button" onclick="loadRemoteTabs()" class="bg-green-600 hover:bg-green-700 text-white px-5 py-3 sm:py-0 rounded-lg font-bold text-sm tracking-wide transition shadow-sm">Load Tabs</button>
              </div>
              <p id="err_targetSheetUrl" class="text-xs text-red-400 mt-1 hidden"></p>
            </div>
            
            <div>
              <label class="block text-sm font-semibold text-gray-400 mb-2">Select Targeted Data Tab</label>
              <select id="tabName" class="w-full bg-gray-700 border border-gray-600 rounded-lg px-4 py-3 text-white focus:outline-none text-sm md:text-base transition"></select>
              <p id="err_tabName" class="text-xs text-red-400 mt-1 hidden"></p>
            </div>

            <!-- TIMING STRATEGY ROUTER BOX -->
            <div class="bg-gray-800 p-4 rounded-lg border border-gray-700 space-y-3">
              <label class="block text-sm font-bold text-gray-300 mb-1">Execution Schedule:</label>
              <div class="flex items-center space-x-6">
                <label class="inline-flex items-center cursor-pointer">
                  <input type="radio" name="deliveryType" value="instant" checked onclick="toggleTimelineUI('instant')" class="form-radio text-blue-500 focus:ring-0 bg-gray-700 border-gray-600 h-4 w-4">
                  <span class="ml-2 text-sm font-semibold text-gray-200">Execute Instantly</span>
                </label>
                <label class="inline-flex items-center cursor-pointer">
                  <input type="radio" name="deliveryType" value="scheduled" onclick="toggleTimelineUI('scheduled')" class="form-radio text-blue-500 focus:ring-0 bg-gray-700 border-gray-600 h-4 w-4">
                  <span class="ml-2 text-sm font-semibold text-gray-200">Schedule Execution</span>
                </label>
              </div>

              <!-- Collapsible Schedule DateTime Inputs -->
              <div id="scheduleTimelineInputs" class="grid grid-cols-1 sm:grid-cols-2 gap-4 pt-2 hidden">
                <div>
                  <label class="block text-xs font-semibold text-gray-400 mb-1">Release Date</label>
                  <input type="date" id="releaseDate" class="w-full bg-gray-700 border border-gray-600 rounded-lg px-4 py-2.5 text-white text-sm transition">
                  <p id="err_releaseDate" class="text-xs text-red-400 mt-1 hidden"></p>
                </div>
                <div>
                  <label class="block text-xs font-semibold text-gray-400 mb-1">Release Time</label>
                  <input type="time" id="releaseTime" class="w-full bg-gray-700 border border-gray-600 rounded-lg px-4 py-2.5 text-white text-sm transition">
                  <p id="err_releaseTime" class="text-xs text-red-400 mt-1 hidden"></p>
                </div>
              </div>
            </div>
          </div>

          <!-- INTERCHANGEABLE ENGINE B: EXCEL STRUCT -->
          <div id="excelSection" class="space-y-4 hidden">
            <div>
              <label class="block text-sm font-semibold text-gray-400 mb-2">Choose Excel File (.xlsx)</label>
              <input type="file" id="excelFile" accept=".xlsx"
                     class="w-full bg-gray-700 border border-gray-600 rounded-lg px-4 py-3 text-white file:bg-blue-600 file:border-0 file:text-white file:px-3 file:py-1 file:rounded-md file:mr-3 text-sm transition">
              <p id="err_excelFile" class="text-xs text-red-400 mt-1 hidden"></p>
            </div>
          </div>

          <!-- Professional Clean Notice Box -->
          <div id="preferenceNotice" class="bg-blue-900 bg-opacity-40 border border-blue-700 rounded-lg p-4 text-xs md:text-sm text-blue-300 leading-relaxed shadow-inner">
            <span class="font-bold">System Preference Note:</span> The Google Sheet URL pipeline is recommended if you require the system to automatically update the execution logs inside the Status column live.
          </div>
        </div>

        <!-- Professional Action Button Text -->
        <button type="submit" id="submitBtn" class="w-full bg-gradient-to-r from-blue-600 to-indigo-600 hover:from-blue-700 hover:to-indigo-700 text-white font-bold py-4 px-4 rounded-xl transition duration-200 shadow-lg tracking-wide text-base md:text-lg">
          Execute Automation Workflow
        </button>
      </form>
    </div>
    
    <div id="responseMessage" class="mt-5 text-center font-bold hidden p-4 rounded-xl text-sm md:text-base shadow-md"></div>
  </div>

  <script>
    let activeSource = 'gsheet';

    function switchSource(source) {
      activeSource = source;
      clearAllErrors();
      const bGsheet = document.getElementById('btnGsheet');
      const bExcel = document.getElementById('btnExcel');
      const secGsheet = document.getElementById('gsheetSection');
      const secExcel = document.getElementById('excelSection');
      const noticeBox = document.getElementById('preferenceNotice');
      
      if(source === 'gsheet') {
        bGsheet.className = "flex-1 py-3 rounded-lg font-bold bg-blue-600 text-white transition text-sm tracking-wide shadow-md";
        bExcel.className = "flex-1 py-3 rounded-lg font-bold bg-gray-700 text-gray-300 transition text-sm tracking-wide hover:bg-gray-600";
        secGsheet.classList.remove('hidden');
        secExcel.classList.add('hidden');
        noticeBox.classList.remove('hidden');
      } else {
        bExcel.className = "flex-1 py-3 rounded-lg font-bold bg-blue-600 text-white transition text-sm tracking-wide shadow-md";
        bGsheet.className = "flex-1 py-3 rounded-lg font-bold bg-gray-700 text-gray-300 transition text-sm tracking-wide hover:bg-gray-600";
        secExcel.classList.remove('hidden');
        secGsheet.classList.add('hidden');
        noticeBox.classList.add('hidden');
      }
    }

    function toggleTimelineUI(type) {
      clearError('releaseDate'); clearError('releaseTime');
      const inputs = document.getElementById('scheduleTimelineInputs');
      if (type === 'scheduled') {
        inputs.classList.remove('hidden');
      } else {
        inputs.classList.add('hidden');
      }
    }

    function setError(fieldId, msg) {
      const field = document.getElementById(fieldId);
      const errMsg = document.getElementById('err_' + fieldId);
      if (field && errMsg) {
        field.classList.add('error-border');
        errMsg.innerHTML = "Error: " + msg;
        errMsg.classList.remove('hidden');
      }
    }

    function clearError(fieldId) {
      const field = document.getElementById(fieldId);
      const errMsg = document.getElementById('err_' + fieldId);
      if (field && errMsg) {
        field.classList.remove('error-border');
        errMsg.classList.add('hidden');
      }
    }

    function clearAllErrors() {
      ['slideUrl', 'slideNumber', 'targetSheetUrl', 'tabName', 'releaseDate', 'releaseTime', 'excelFile'].forEach(clearError);
    }

    function loadRemoteTabs() {
      clearError('targetSheetUrl');
      const url = document.getElementById('targetSheetUrl').value;
      if (!url) return setError('targetSheetUrl', "Spreadsheet URL field cannot be empty.");
      
      const respBox = document.getElementById('responseMessage');
      respBox.innerHTML = "Verifying workbook architecture... Please wait.";
      respBox.className = "mt-5 text-center font-bold text-yellow-400 bg-gray-900 border border-yellow-700 p-3 rounded-xl";
      respBox.classList.remove('hidden');
      
      google.script.run
        .withSuccessHandler(tabs => {
          const select = document.getElementById('tabName');
          select.innerHTML = "";
          tabs.forEach(tab => {
            let opt = document.createElement('option');
            opt.value = tab; opt.innerHTML = tab;
            select.appendChild(opt);
          });
          respBox.classList.add('hidden');
        })
        .withFailureHandler(err => {
          respBox.classList.add('hidden');
          setError('targetSheetUrl', err.message);
        })
        .getRemoteTabs(url);
    }

    document.getElementById('masterForm').addEventListener('submit', function(e) {
      e.preventDefault();
      clearAllErrors();
      
      const btn = document.getElementById('submitBtn');
      const respBox = document.getElementById('responseMessage');
      let hasError = false;

      const slideUrl = document.getElementById('slideUrl').value;
      const slideNumber = document.getElementById('slideNumber').value;

      if (!slideUrl) { setError('slideUrl', "Template URL is required."); hasError = true; }
      if (!slideNumber || slideNumber < 1) { setError('slideNumber', "Invalid slide index number."); hasError = true; }

      if (activeSource === 'gsheet') {
        const targetSheetUrl = document.getElementById('targetSheetUrl').value;
        const tabName = document.getElementById('tabName').value;
        const deliveryType = document.querySelector('input[name="deliveryType"]:checked').value;
        
        if (!targetSheetUrl) { setError('targetSheetUrl', "Target Sheet URL is required."); hasError = true; }
        if (!tabName) { setError('tabName', "Please load tabs and select a valid data source."); hasError = true; }
        
        let releaseDate = "", releaseTime = "";
        if (deliveryType === 'scheduled') {
          releaseDate = document.getElementById('releaseDate').value;
          releaseTime = document.getElementById('releaseTime').value;
          if (!releaseDate) { setError('releaseDate', "Specify release date."); hasError = true; }
          if (!releaseTime) { setError('releaseTime', "Specify release time."); hasError = true; }
        }

        if (hasError) return;

        btn.disabled = true; btn.innerHTML = "Processing workflow vectors...";
        respBox.classList.add('hidden');

        const payload = {
          slideUrl: slideUrl,
          slideNumber: slideNumber,
          targetSheetUrl: targetSheetUrl,
          tabName: tabName,
          deliveryType: deliveryType,
          releaseDate: releaseDate,
          releaseTime: releaseTime
        };

        google.script.run
          .withSuccessHandler(msg => {
            showResponse(msg, "text-green-400 bg-green-950 bg-opacity-40 border border-green-800");
            btn.disabled = false; btn.innerHTML = "Execute Automation Workflow";
          })
          .withFailureHandler(err => {
            showResponse(err.message, "text-red-400 bg-red-950 bg-opacity-40 border border-red-800");
            btn.disabled = false; btn.innerHTML = "Execute Automation Workflow";
          })
          .processGoogleSheetPipeline(payload);
          
      } else {
        const fileInput = document.getElementById('excelFile').files[0];
        if(!fileInput) { setError('excelFile', "Please select a valid Excel file."); hasError = true; }
        if (hasError) return;

        btn.disabled = true; btn.innerHTML = "Processing binary data...";
        respBox.classList.add('hidden');
        
        const reader = new FileReader();
        reader.onload = function(evt) {
          const base64Data = evt.target.result.split(',')[1];
          google.script.run
            .withSuccessHandler(msg => {
              showResponse(msg, "text-green-400 bg-green-950 bg-opacity-40 border border-green-800");
              btn.disabled = false; btn.innerHTML = "Execute Automation Workflow";
            })
            .withFailureHandler(err => {
              showResponse(err.message, "text-red-400 bg-red-950 bg-opacity-40 border border-red-800");
              btn.disabled = false; btn.innerHTML = "Execute Automation Workflow";
            })
            .processExcelUploadPipeline(base64Data, slideUrl, slideNumber);
        };
        reader.readAsDataURL(fileInput);
      }
    });

    // Clean Dynamic Error Display Framework
    function showResponse(msg, cssClasses) {
      const respBox = document.getElementById('responseMessage');
      respBox.innerHTML = msg;
      respBox.className = `mt-5 text-center font-bold p-4 rounded-xl ${cssClasses}`;
      respBox.classList.remove('hidden');
    }
  </script>
</body>
</html>
